<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator — Free Secure Password Tool | ShipMicro</title>
    <meta name="description"
        content="Generate secure, random passwords with visual strength analysis. Customizable length, character sets, and batch generation.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0a;
            color: #e5e5e5;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center
        }

        .container {
            max-width: 520px;
            width: 100%;
            padding: 24px
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px
        }

        .back {
            color: #666;
            text-decoration: none;
            font-size: 13px
        }

        .back:hover {
            color: #fff
        }

        .title {
            font-size: 18px;
            font-weight: 800
        }

        .badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(34, 197, 94, .1);
            border: 1px solid rgba(34, 197, 94, .2);
            color: #22c55e
        }

        .pw-display {
            position: relative;
            background: rgba(255, 255, 255, .03);
            border: 2px solid rgba(255, 255, 255, .1);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            text-align: center;
            transition: border-color .3s
        }

        .pw-text {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 20px;
            font-weight: 700;
            word-break: break-all;
            letter-spacing: 1px;
            line-height: 1.5;
            min-height: 30px
        }

        .strength-bar {
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, .06);
            margin-top: 12px;
            overflow: hidden
        }

        .strength-fill {
            height: 100%;
            border-radius: 2px;
            transition: width .3s, background .3s
        }

        .strength-label {
            font-size: 11px;
            font-weight: 700;
            margin-top: 6px;
            text-align: right
        }

        .actions {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, .08);
            background: transparent;
            color: #999;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all .15s;
            text-align: center
        }

        .btn:hover {
            background: rgba(255, 255, 255, .05);
            color: #fff
        }

        .btn.primary {
            background: linear-gradient(135deg, #22c55e, #06b6d4);
            color: #fff;
            border: none
        }

        .btn.primary:hover {
            opacity: .9;
            transform: scale(1.01)
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 14px
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .control-label {
            font-size: 13px;
            color: #999;
            font-weight: 600
        }

        .control-value {
            font-size: 13px;
            color: #06b6d4;
            font-weight: 700
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, .08);
            outline: none;
            margin-top: 4px
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #06b6d4;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(6, 182, 212, .4)
        }

        .toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer
        }

        .toggle input {
            display: none
        }

        .toggle-track {
            width: 36px;
            height: 20px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .1);
            position: relative;
            transition: background .2s
        }

        .toggle input:checked+.toggle-track {
            background: rgba(6, 182, 212, .4)
        }

        .toggle-knob {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: left .2s
        }

        .toggle input:checked+.toggle-track .toggle-knob {
            left: 18px
        }

        .sep {
            height: 1px;
            background: rgba(255, 255, 255, .06);
            margin: 16px 0
        }

        .batch {
            margin-top: 16px
        }

        .batch-title {
            font-size: 12px;
            color: #555;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px
        }

        .batch-list {
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .batch-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, .02);
            border: 1px solid rgba(255, 255, 255, .04)
        }

        .batch-pw {
            font-family: monospace;
            font-size: 12px;
            color: #888;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 8px
        }

        .batch-copy {
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, .08);
            background: transparent;
            color: #666;
            font-size: 11px;
            cursor: pointer
        }

        .batch-copy:hover {
            color: #fff
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            border-radius: 10px;
            background: rgba(34, 197, 94, .15);
            border: 1px solid rgba(34, 197, 94, .3);
            color: #22c55e;
            font-size: 13px;
            font-weight: 600;
            z-index: 200;
            opacity: 0;
            transition: opacity .2s;
            pointer-events: none
        }

        .toast.show {
            opacity: 1
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <a href="/tools" class="back">← Tools</a><span style="color:rgba(255,255,255,.1)">|</span>
            <span class="title">🔒 Password Generator</span><span class="badge">FREE</span>
        </div>

        <div class="pw-display" id="pw-box">
            <div class="pw-text" id="pw">—</div>
            <div class="strength-bar">
                <div class="strength-fill" id="str-fill"></div>
            </div>
            <div class="strength-label" id="str-label">—</div>
        </div>

        <div class="actions">
            <button class="btn primary" onclick="generate()">🔄 Generate</button>
            <button class="btn" onclick="copy()">📋 Copy</button>
            <button class="btn" onclick="generateBatch()">📦 Batch (5)</button>
        </div>

        <div class="controls">
            <div>
                <div class="control-row">
                    <span class="control-label">Length</span>
                    <span class="control-value" id="len-val">16</span>
                </div>
                <input type="range" id="len" min="4" max="128" value="16" oninput="updateLen()">
            </div>

            <div class="sep"></div>

            <label class="toggle"><input type="checkbox" id="opt-upper" checked onchange="generate()">
                <div class="toggle-track">
                    <div class="toggle-knob"></div>
                </div><span class="control-label">Uppercase (A-Z)</span>
            </label>
            <label class="toggle"><input type="checkbox" id="opt-lower" checked onchange="generate()">
                <div class="toggle-track">
                    <div class="toggle-knob"></div>
                </div><span class="control-label">Lowercase (a-z)</span>
            </label>
            <label class="toggle"><input type="checkbox" id="opt-digits" checked onchange="generate()">
                <div class="toggle-track">
                    <div class="toggle-knob"></div>
                </div><span class="control-label">Numbers (0-9)</span>
            </label>
            <label class="toggle"><input type="checkbox" id="opt-sym" checked onchange="generate()">
                <div class="toggle-track">
                    <div class="toggle-knob"></div>
                </div><span class="control-label">Symbols (!@#$...)</span>
            </label>
            <label class="toggle"><input type="checkbox" id="opt-ambig" onchange="generate()">
                <div class="toggle-track">
                    <div class="toggle-knob"></div>
                </div><span class="control-label">Exclude ambiguous (0O1lI)</span>
            </label>
        </div>

        <div class="batch" id="batch-area"></div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ', LOWER = 'abcdefghijklmnopqrstuvwxyz', DIGITS = '0123456789', SYMBOLS = '!@#$%^&*()_+-=[]{}|;:,.<>?';
        const AMBIG = '0O1lI';
        function getCharset() {
            let cs = '';
            if (document.getElementById('opt-upper').checked) cs += UPPER;
            if (document.getElementById('opt-lower').checked) cs += LOWER;
            if (document.getElementById('opt-digits').checked) cs += DIGITS;
            if (document.getElementById('opt-sym').checked) cs += SYMBOLS;
            if (document.getElementById('opt-ambig').checked) cs = [...cs].filter(c => !AMBIG.includes(c)).join('');
            return cs || LOWER;
        }
        function gen(len) {
            const cs = getCharset(); const arr = new Uint32Array(len); crypto.getRandomValues(arr);
            return Array.from(arr, v => cs[v % cs.length]).join('');
        }
        function calcStrength(pw) {
            let score = 0; if (pw.length >= 8) score++; if (pw.length >= 12) score++; if (pw.length >= 20) score++;
            if (/[A-Z]/.test(pw)) score++; if (/[a-z]/.test(pw)) score++; if (/\d/.test(pw)) score++; if (/[^A-Za-z0-9]/.test(pw)) score++;
            const unique = new Set(pw).size; if (unique > pw.length * .7) score++;
            return Math.min(score, 8);
        }
        function generate() {
            const len = parseInt(document.getElementById('len').value);
            const pw = gen(len); document.getElementById('pw').textContent = pw;
            const str = calcStrength(pw);
            const fill = document.getElementById('str-fill');
            const pct = (str / 8) * 100; fill.style.width = pct + '%';
            const label = document.getElementById('str-label');
            if (str <= 2) { fill.style.background = '#ef4444'; label.textContent = 'Weak'; label.style.color = '#ef4444' }
            else if (str <= 4) { fill.style.background = '#f97316'; label.textContent = 'Fair'; label.style.color = '#f97316' }
            else if (str <= 6) { fill.style.background = '#f59e0b'; label.textContent = 'Good'; label.style.color = '#f59e0b' }
            else { fill.style.background = 'linear-gradient(90deg,#22c55e,#06b6d4)'; label.textContent = 'Strong 🛡️'; label.style.color = '#22c55e' }
            document.getElementById('pw-box').style.borderColor = str <= 2 ? 'rgba(239,68,68,.3)' : str <= 4 ? 'rgba(249,115,22,.3)' : str <= 6 ? 'rgba(245,158,11,.3)' : 'rgba(34,197,94,.3)';
        }
        function copy() { const pw = document.getElementById('pw').textContent; if (pw === '—') return; navigator.clipboard.writeText(pw).then(() => showToast('Copied!')) }
        function updateLen() { document.getElementById('len-val').textContent = document.getElementById('len').value; generate() }
        function generateBatch() {
            const len = parseInt(document.getElementById('len').value);
            const pws = Array.from({ length: 5 }, () => gen(len));
            document.getElementById('batch-area').innerHTML = `<div class="batch-title">Batch Generated</div><div class="batch-list">${pws.map(pw => `<div class="batch-item"><span class="batch-pw">${pw}</span><button class="batch-copy" onclick="navigator.clipboard.writeText('${pw}').then(()=>showToast('Copied!'))">Copy</button></div>`).join('')}</div>`;
        }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1500) }
        generate();
    </script>
</body>

</html>

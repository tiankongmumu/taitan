<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter — Free Online JSON Beautifier | ShipMicro</title>
    <meta name="description"
        content="Format, validate, and beautify JSON data instantly. Zero latency, offline-capable, with operation history.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #e5e5e5;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ─── Header ─── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-link {
            color: #666;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.15s;
        }

        .back-link:hover {
            color: #fff;
        }

        .tool-name {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
        }

        .badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.2);
            color: #06b6d4;
        }

        .header-right {
            display: flex;
            gap: 8px;
        }

        /* ─── Toolbar ─── */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.01);
        }

        .tool-btn {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: transparent;
            color: #999;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tool-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.15);
        }

        .tool-btn.primary {
            background: rgba(6, 182, 212, 0.1);
            border-color: rgba(6, 182, 212, 0.3);
            color: #06b6d4;
        }

        .tool-btn.primary:hover {
            background: rgba(6, 182, 212, 0.2);
        }

        .separator {
            width: 1px;
            background: rgba(255, 255, 255, 0.06);
            margin: 0 4px;
        }

        .spacer {
            flex: 1;
        }

        /* ─── Editor Area ─── */
        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 0;
        }

        @media (min-width: 768px) {
            .editor-area {
                flex-direction: row;
            }
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 200px;
        }

        .panel+.panel {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        @media (min-width: 768px) {
            .panel+.panel {
                border-top: none;
                border-left: 1px solid rgba(255, 255, 255, 0.06);
            }
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
        }

        .panel-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
        }

        .panel-info {
            font-size: 11px;
            color: #444;
        }

        textarea {
            flex: 1;
            width: 100%;
            border: none;
            background: transparent;
            color: #e5e5e5;
            font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            padding: 16px;
            resize: none;
            outline: none;
            tab-size: 2;
        }

        textarea::placeholder {
            color: #333;
        }

        textarea.error {
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* ─── Status Bar ─── */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.01);
            flex-shrink: 0;
        }

        .status-left,
        .status-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-item {
            font-size: 11px;
            color: #444;
        }

        .status-item.valid {
            color: #22c55e;
        }

        .status-item.invalid {
            color: #ef4444;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }

        .status-dot.green {
            background: #22c55e;
            box-shadow: 0 0 6px rgba(34, 197, 94, 0.4);
        }

        .status-dot.red {
            background: #ef4444;
            box-shadow: 0 0 6px rgba(239, 68, 68, 0.4);
        }

        .status-dot.gray {
            background: #333;
        }

        /* ─── History Panel ─── */
        .history-panel {
            position: absolute;
            right: 20px;
            top: 50px;
            width: 280px;
            max-height: 300px;
            overflow-y: auto;
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            z-index: 50;
            display: none;
        }

        .history-panel.open {
            display: block;
        }

        .history-item {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            transition: background 0.1s;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .history-item .h-time {
            font-size: 10px;
            color: #444;
        }

        .history-item .h-preview {
            font-size: 11px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        /* ─── Drop Zone ─── */
        .drop-active {
            outline: 2px dashed rgba(6, 182, 212, 0.5);
            outline-offset: -8px;
            background: rgba(6, 182, 212, 0.03) !important;
        }

        /* ─── Toast ─── */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            border-radius: 10px;
            background: rgba(6, 182, 212, 0.15);
            border: 1px solid rgba(6, 182, 212, 0.3);
            color: #06b6d4;
            font-size: 13px;
            font-weight: 600;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <a href="/tools" class="back-link">← Tools</a>
            <span style="color:rgba(255,255,255,0.1)">|</span>
            <span class="tool-name">⚡ JSON Formatter</span>
            <span class="badge">FREE</span>
        </div>
        <div class="header-right">
            <button class="tool-btn" onclick="toggleHistory()" title="History">🕐 History</button>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <button class="tool-btn primary" onclick="formatJSON(2)" title="Ctrl+Enter">✨ Beautify (2)</button>
        <button class="tool-btn" onclick="formatJSON(4)">4-space</button>
        <button class="tool-btn" onclick="formatJSON(0)">Minify</button>
        <div class="separator"></div>
        <button class="tool-btn" onclick="sortKeys()">🔤 Sort Keys</button>
        <button class="tool-btn" onclick="fixJSON()">🔧 Auto-Fix</button>
        <div class="separator"></div>
        <button class="tool-btn" onclick="pasteClipboard()">📋 Paste</button>
        <div class="spacer"></div>
        <button class="tool-btn" onclick="copyOutput()">📤 Copy</button>
        <button class="tool-btn" onclick="downloadJSON()">💾 Download</button>
        <button class="tool-btn" onclick="clearAll()">🗑️ Clear</button>
    </div>

    <!-- Editor Area -->
    <div class="editor-area">
        <div class="panel" id="input-panel">
            <div class="panel-header">
                <div class="panel-title">Input</div>
                <div class="panel-info" id="input-info">Paste or drop JSON here</div>
            </div>
            <textarea id="input"
                placeholder='Paste JSON here, drop a file, or press Ctrl+V anywhere...\n\nExample:\n{"name":"ShipMicro","version":3.5,"features":["tools","games","news"]}'
                spellcheck="false"></textarea>
        </div>

        <div class="panel" id="output-panel">
            <div class="panel-header">
                <div class="panel-title">Output</div>
                <div class="panel-info" id="output-info">—</div>
            </div>
            <textarea id="output" readonly placeholder="Formatted output will appear here..."
                spellcheck="false"></textarea>
        </div>

        <!-- History Panel -->
        <div class="history-panel" id="history-panel"></div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-left">
            <div class="status-item" id="status-validation"><span class="status-dot gray"></span>Ready</div>
            <div class="status-item" id="status-size"></div>
        </div>
        <div class="status-right">
            <div class="status-item">Ctrl+Enter: Format</div>
            <div class="status-item">Ctrl+V: Auto-paste</div>
            <div class="status-item" id="status-time"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const HISTORY_KEY = 'shipmicro_json_history';

        // ─── Core: Format JSON ───
        function formatJSON(indent = 2) {
            const raw = input.value.trim();
            if (!raw) { setStatus('empty'); return; }

            const start = performance.now();
            try {
                const parsed = JSON.parse(raw);
                const formatted = indent === 0
                    ? JSON.stringify(parsed)
                    : JSON.stringify(parsed, null, indent);
                output.value = formatted;

                const elapsed = (performance.now() - start).toFixed(1);
                setStatus('valid', raw.length, formatted.length, elapsed);
                saveHistory(raw);
            } catch (e) {
                output.value = `❌ Error: ${e.message}`;
                setStatus('invalid', raw.length, 0, 0, e.message);
            }
        }

        // ─── Sort Keys ───
        function sortKeys() {
            const raw = input.value.trim();
            if (!raw) return;
            try {
                const parsed = JSON.parse(raw);
                const sorted = sortObjectKeys(parsed);
                output.value = JSON.stringify(sorted, null, 2);
                setStatus('valid', raw.length, output.value.length, '—');
                showToast('Keys sorted alphabetically');
            } catch (e) {
                output.value = `❌ Error: ${e.message}`;
                setStatus('invalid', raw.length, 0, 0, e.message);
            }
        }

        function sortObjectKeys(obj) {
            if (Array.isArray(obj)) return obj.map(sortObjectKeys);
            if (obj !== null && typeof obj === 'object') {
                return Object.keys(obj).sort().reduce((acc, key) => {
                    acc[key] = sortObjectKeys(obj[key]);
                    return acc;
                }, {});
            }
            return obj;
        }

        // ─── Auto-Fix ───
        function fixJSON() {
            let raw = input.value.trim();
            if (!raw) return;
            // Common fixes
            raw = raw.replace(/'/g, '"');  // single to double quotes
            raw = raw.replace(/,\s*([\]}])/g, '$1');  // trailing commas
            raw = raw.replace(/([{,]\s*)(\w+)\s*:/g, '$1"$2":');  // unquoted keys
            input.value = raw;
            formatJSON(2);
            showToast('Auto-fix applied');
        }

        // ─── Status Bar ───
        function setStatus(state, inputSize = 0, outputSize = 0, elapsed = 0, error = '') {
            const el = document.getElementById('status-validation');
            const sizeEl = document.getElementById('status-size');
            const timeEl = document.getElementById('status-time');

            if (state === 'valid') {
                el.innerHTML = '<span class="status-dot green"></span>Valid JSON';
                el.className = 'status-item valid';
                sizeEl.textContent = `${formatBytes(inputSize)} → ${formatBytes(outputSize)}`;
                timeEl.textContent = `${elapsed}ms`;
            } else if (state === 'invalid') {
                el.innerHTML = `<span class="status-dot red"></span>${error.substring(0, 60)}`;
                el.className = 'status-item invalid';
                sizeEl.textContent = formatBytes(inputSize);
                timeEl.textContent = '';
            } else {
                el.innerHTML = '<span class="status-dot gray"></span>Ready';
                el.className = 'status-item';
                sizeEl.textContent = '';
                timeEl.textContent = '';
            }

            document.getElementById('input-info').textContent = inputSize ? `${formatBytes(inputSize)}` : 'Paste or drop JSON';
            document.getElementById('output-info').textContent = outputSize ? `${formatBytes(outputSize)}` : '—';
        }

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        // ─── History (LocalStorage) ───
        function getHistory() {
            try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
        }

        function saveHistory(raw) {
            const history = getHistory();
            const preview = raw.substring(0, 80).replace(/\n/g, ' ');
            history.unshift({ preview, time: new Date().toLocaleTimeString(), data: raw.substring(0, 2000) });
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(0, 20)));
        }

        function toggleHistory() {
            const panel = document.getElementById('history-panel');
            const isOpen = panel.classList.toggle('open');
            if (isOpen) renderHistory();
        }

        function renderHistory() {
            const history = getHistory();
            const panel = document.getElementById('history-panel');
            if (history.length === 0) {
                panel.innerHTML = '<div style="padding:20px;text-align:center;color:#444;font-size:12px">No history yet</div>';
                return;
            }
            panel.innerHTML = history.map((h, i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <div class="h-time">${h.time}</div>
      <div class="h-preview">${h.preview}</div>
    </div>
  `).join('');
        }

        function loadHistory(index) {
            const history = getHistory();
            if (history[index]) {
                input.value = history[index].data;
                formatJSON(2);
                document.getElementById('history-panel').classList.remove('open');
            }
        }

        // ─── Copy / Download / Clear ───
        function copyOutput() {
            const text = output.value;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!'));
        }

        function downloadJSON() {
            const text = output.value || input.value;
            if (!text) return;
            const blob = new Blob([text], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'formatted.json'; a.click();
            URL.revokeObjectURL(url);
            showToast('Downloaded!');
        }

        function clearAll() {
            input.value = '';
            output.value = '';
            setStatus('empty');
        }

        function pasteClipboard() {
            navigator.clipboard.readText().then(text => {
                input.value = text;
                formatJSON(2);
                showToast('Pasted from clipboard');
            }).catch(() => { });
        }

        // ─── Toast ───
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }

        // ─── Keyboard Shortcuts ───
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); formatJSON(2); }
            if ((e.ctrlKey || e.metaKey) && e.key === 'l') { e.preventDefault(); clearAll(); }
        });

        // ─── Auto-format on paste ───
        input.addEventListener('paste', () => {
            setTimeout(() => formatJSON(2), 50);
        });

        // ─── Live validation on input ───
        let debounceTimer;
        input.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                const raw = input.value.trim();
                if (!raw) { setStatus('empty'); output.value = ''; return; }
                try { JSON.parse(raw); setStatus('valid', raw.length, 0, '—'); }
                catch (e) { setStatus('invalid', raw.length, 0, 0, e.message); }
            }, 300);
        });

        // ─── Drag & Drop ───
        const inputPanel = document.getElementById('input-panel');
        ['dragenter', 'dragover'].forEach(evt => {
            inputPanel.addEventListener(evt, e => { e.preventDefault(); inputPanel.classList.add('drop-active'); });
        });
        ['dragleave', 'drop'].forEach(evt => {
            inputPanel.addEventListener(evt, e => { e.preventDefault(); inputPanel.classList.remove('drop-active'); });
        });
        inputPanel.addEventListener('drop', e => {
            const file = e.dataTransfer.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = ev => { input.value = ev.target.result; formatJSON(2); };
                reader.readAsText(file);
            }
        });
    </script>
</body>

</html>

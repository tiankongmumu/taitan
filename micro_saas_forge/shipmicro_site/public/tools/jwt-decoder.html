<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT Decoder — Free Online Token Inspector | ShipMicro</title>
    <meta name="description"
        content="Decode and inspect JWT tokens. View header, payload, signature verification status, and expiry warnings.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #0a0a0a;
            color: #e5e5e5;
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, .06)
        }

        .back {
            color: #666;
            text-decoration: none;
            font-size: 13px
        }

        .back:hover {
            color: #fff
        }

        .title {
            font-size: 15px;
            font-weight: 700
        }

        .badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(168, 85, 247, .1);
            border: 1px solid rgba(168, 85, 247, .2);
            color: #a855f7
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto
        }

        .input-section {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, .06)
        }

        .input-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #555;
            margin-bottom: 8px
        }

        textarea {
            width: 100%;
            border: 2px solid rgba(255, 255, 255, .08);
            background: rgba(255, 255, 255, .02);
            color: #e5e5e5;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.6;
            padding: 14px;
            border-radius: 12px;
            resize: none;
            outline: none;
            transition: border-color .15s;
            height: 100px
        }

        textarea:focus {
            border-color: rgba(168, 85, 247, .3)
        }

        .toolbar {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap
        }

        .btn {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, .08);
            background: transparent;
            color: #999;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            display: flex;
            align-items: center;
            gap: 4px
        }

        .btn:hover {
            background: rgba(255, 255, 255, .05);
            color: #fff
        }

        .decoded {
            padding: 20px
        }

        .section {
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, .06);
            border-radius: 14px;
            overflow: hidden;
            background: rgba(255, 255, 255, .01)
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: rgba(255, 255, 255, .02);
            border-bottom: 1px solid rgba(255, 255, 255, .04)
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px
        }

        .section-title.header-color {
            color: #ef4444
        }

        .section-title.payload-color {
            color: #a855f7
        }

        .section-title.sig-color {
            color: #06b6d4
        }

        .section-body {
            padding: 14px 16px;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all
        }

        .key {
            color: #888
        }

        .val-str {
            color: #22c55e
        }

        .val-num {
            color: #f59e0b
        }

        .val-bool {
            color: #06b6d4
        }

        .val-null {
            color: #666
        }

        .warning {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px
        }

        .warning.expired {
            background: rgba(239, 68, 68, .1);
            border: 1px solid rgba(239, 68, 68, .2);
            color: #ef4444
        }

        .warning.valid {
            background: rgba(34, 197, 94, .1);
            border: 1px solid rgba(34, 197, 94, .2);
            color: #22c55e
        }

        .warning.soon {
            background: rgba(245, 158, 11, .1);
            border: 1px solid rgba(245, 158, 11, .2);
            color: #f59e0b
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            border-radius: 10px;
            background: rgba(168, 85, 247, .15);
            border: 1px solid rgba(168, 85, 247, .3);
            color: #a855f7;
            font-size: 13px;
            font-weight: 600;
            z-index: 200;
            opacity: 0;
            transition: opacity .2s;
            pointer-events: none
        }

        .toast.show {
            opacity: 1
        }
    </style>
</head>

<body>
    <div class="header">
        <a href="/tools" class="back">← Tools</a><span style="color:rgba(255,255,255,.1)">|</span>
        <span class="title">🎫 JWT Decoder</span><span class="badge">FREE</span>
    </div>
    <div class="main">
        <div class="input-section">
            <div class="input-label">Paste JWT Token</div>
            <textarea id="jwt"
                placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c"
                spellcheck="false"></textarea>
            <div class="toolbar">
                <button class="btn" onclick="pasteJWT()">📋 Paste</button>
                <button class="btn" onclick="loadSample()">📝 Sample</button>
                <button class="btn" onclick="copyDecoded()">📤 Copy Decoded</button>
                <button class="btn" onclick="clearAll()">🗑️</button>
            </div>
        </div>
        <div class="decoded" id="decoded">
            <div style="text-align:center;color:#333;padding:40px">Paste a JWT above to decode</div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        const jwtInput = document.getElementById('jwt'), decoded = document.getElementById('decoded');
        let decodedData = {};
        function b64decode(str) { try { return JSON.parse(decodeURIComponent(atob(str.replace(/-/g, '+').replace(/_/g, '/')).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''))) } catch { return null } }
        function decode() {
            const token = jwtInput.value.trim(); if (!token) { decoded.innerHTML = '<div style="text-align:center;color:#333;padding:40px">Paste a JWT above to decode</div>'; return }
            const parts = token.split('.');
            if (parts.length !== 3) { decoded.innerHTML = '<div class="warning expired">⚠️ Invalid JWT: Expected 3 parts (header.payload.signature), got ' + parts.length + '</div>'; return }
            const header = b64decode(parts[0]), payload = b64decode(parts[1]);
            if (!header || !payload) { decoded.innerHTML = '<div class="warning expired">⚠️ Could not decode token. Invalid Base64.</div>'; return }
            decodedData = { header, payload };
            let html = '';
            // Expiry check
            if (payload.exp) {
                const now = Math.floor(Date.now() / 1000); const diff = payload.exp - now;
                if (diff < 0) html += `<div class="warning expired">⚠️ Token EXPIRED ${formatDuration(-diff)} ago</div>`;
                else if (diff < 3600) html += `<div class="warning soon">⏰ Token expires in ${formatDuration(diff)}</div>`;
                else html += `<div class="warning valid">✅ Token valid for ${formatDuration(diff)}</div>`;
            }
            // Header
            html += `<div class="section"><div class="section-header"><span class="section-title header-color">Header (Algorithm & Token Type)</span><span style="font-size:11px;color:#555">${parts[0].length} chars</span></div><div class="section-body">${formatJSON(header)}</div></div>`;
            // Payload
            html += `<div class="section"><div class="section-header"><span class="section-title payload-color">Payload (Claims)</span><span style="font-size:11px;color:#555">${parts[1].length} chars</span></div><div class="section-body">${formatJSON(payload)}</div></div>`;
            // Signature
            html += `<div class="section"><div class="section-header"><span class="section-title sig-color">Signature</span><span style="font-size:11px;color:#555">${parts[2].length} chars</span></div><div class="section-body" style="color:#555;font-size:12px">${parts[2]}<br><br><span style="color:#444">⚠️ Signature verification requires the secret key (not available client-side)</span></div></div>`;
            // Timestamp translations
            const timestamps = ['iat', 'exp', 'nbf'];
            const tsEntries = timestamps.filter(k => payload[k]);
            if (tsEntries.length > 0) {
                html += '<div class="section"><div class="section-header"><span class="section-title" style="color:#f59e0b">Timestamps</span></div><div class="section-body">';
                tsEntries.forEach(k => { html += `<span class="key">${k}</span>: ${new Date(payload[k] * 1000).toISOString()} (${new Date(payload[k] * 1000).toLocaleString()})\n` });
                html += '</div></div>';
            }
            decoded.innerHTML = html;
        }
        function formatJSON(obj) {
            return JSON.stringify(obj, null, 2).replace(/(".*?"):/g, '<span class="key">$1</span>:').replace(/: (".*?")/g, ': <span class="val-str">$1</span>').replace(/: (\d+)/g, ': <span class="val-num">$1</span>').replace(/: (true|false)/g, ': <span class="val-bool">$1</span>').replace(/: (null)/g, ': <span class="val-null">$1</span>');
        }
        function formatDuration(s) { if (s < 60) return s + 's'; if (s < 3600) return Math.floor(s / 60) + 'm'; if (s < 86400) return Math.floor(s / 3600) + 'h ' + Math.floor((s % 3600) / 60) + 'm'; return Math.floor(s / 86400) + 'd ' + Math.floor((s % 86400) / 3600) + 'h' }
        function pasteJWT() { navigator.clipboard.readText().then(t => { jwtInput.value = t.trim(); decode(); showToast('Pasted') }) }
        function loadSample() { jwtInput.value = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyLCJleHAiOjE3MDkzMTIwMDB9.abc123'; decode() }
        function copyDecoded() { if (!decodedData.payload) return; navigator.clipboard.writeText(JSON.stringify(decodedData, null, 2)).then(() => showToast('Copied!')) }
        function clearAll() { jwtInput.value = ''; decoded.innerHTML = '<div style="text-align:center;color:#333;padding:40px">Paste a JWT above to decode</div>' }
        function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1500) }
        jwtInput.addEventListener('input', decode); jwtInput.addEventListener('paste', () => setTimeout(decode, 50));
    </script>
</body>

</html>

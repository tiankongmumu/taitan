<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>水果忍者 — ShipMicro 游戏厅</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: #050510;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 5, 16, .92);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn .3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.05)
      }
    }

    @keyframes glow {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(249, 115, 22, .2)
      }

      50% {
        box-shadow: 0 0 40px rgba(249, 115, 22, .5)
      }
    }

    .card {
      text-align: center;
      padding: 48px 36px;
      max-width: 400px;
      width: 92%;
      background: linear-gradient(135deg, rgba(249, 115, 22, .05), rgba(239, 68, 68, .05));
      border: 1px solid rgba(249, 115, 22, .15);
      border-radius: 28px;
      color: #fff;
      animation: slideUp .4s ease;
    }

    .card-icon {
      font-size: 80px;
      margin-bottom: 16px;
      display: block;
      animation: pulse 2s infinite
    }

    .card h2 {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 4px;
      letter-spacing: -0.5px
    }

    .card .sub {
      color: #888;
      font-size: 13px;
      margin-bottom: 6px
    }

    .card .desc {
      color: #555;
      font-size: 12px;
      margin-bottom: 16px;
      line-height: 1.5
    }

    .card .stats-row {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin: 16px 0;
      padding: 12px 0;
      border-top: 1px solid rgba(255, 255, 255, .05);
      border-bottom: 1px solid rgba(255, 255, 255, .05);
    }

    .card .stat-item {
      text-align: center
    }

    .card .stat-val {
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(135deg, #f97316, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent
    }

    .card .stat-lbl {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #555
    }

    .card .record-badge {
      color: #f59e0b;
      font-weight: 800;
      font-size: 14px;
      margin: 8px 0;
      display: none
    }

    .card .record-badge.show {
      display: block;
      animation: pulse .5s
    }

    .btn {
      display: inline-block;
      padding: 16px 44px;
      border-radius: 16px;
      border: none;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(135deg, #f97316, #ef4444);
      color: #fff;
      margin-top: 16px;
      transition: all .2s;
      animation: glow 2s infinite;
    }

    .btn:hover {
      transform: scale(1.05)
    }

    .btn:active {
      transform: scale(.97)
    }

    .btn-ghost {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 12px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08);
      color: #777;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: all .2s;
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, .08);
      color: #aaa
    }

    .hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      z-index: 50;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(5, 5, 16, .6) 0%, transparent 100%);
    }

    .hud-item {
      text-align: center
    }

    .hud-val {
      font-size: 24px;
      font-weight: 900;
      background: linear-gradient(135deg, #f97316, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hud-lbl {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #444
    }

    .hud .combo-fire {
      color: #f59e0b;
      font-weight: 800;
      font-size: 14px;
      text-shadow: 0 0 10px rgba(245, 158, 11, .5)
    }

    .hidden {
      display: none !important
    }
  </style>
</head>

<body>
  <div class="hud hidden" id="hud">
    <div class="hud-item">
      <div class="hud-val" id="h-score">0</div>
      <div class="hud-lbl">分数</div>
    </div>
    <div class="hud-item">
      <div id="h-combo" class="combo-fire">—</div>
      <div class="hud-lbl">连击</div>
    </div>
    <div class="hud-item">
      <div class="hud-val" id="h-lives">❤️❤️❤️</div>
      <div class="hud-lbl">生命</div>
    </div>
  </div>
  <canvas id="c"></canvas>

  <!-- Start -->
  <div class="overlay" id="start-ov">
    <div class="card">
      <span class="card-icon">🍉</span>
      <h2>水果忍者</h2>
      <div class="sub">Fruit Slicer</div>
      <div class="desc">
        滑动切开飞起的水果 · 不要漏掉！<br>
        3次漏掉 = 游戏结束 · 连击获得加分<br>
        ⚡ 闪电水果 = 双倍分数 · 💣 炸弹 = 立即结束
      </div>
      <button class="btn" onclick="startGame()">开始游戏</button>
      <br>
      <button class="btn-ghost" onclick="location.href='/arcade'">← 返回游戏厅</button>
    </div>
  </div>

  <!-- End -->
  <div class="overlay hidden" id="end-ov">
    <div class="card">
      <span class="card-icon">🍉</span>
      <h2>游戏结束</h2>
      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-val" id="f-score">0</div>
          <div class="stat-lbl">总分</div>
        </div>
        <div class="stat-item">
          <div class="stat-val" id="f-combo">0</div>
          <div class="stat-lbl">最高连击</div>
        </div>
        <div class="stat-item">
          <div class="stat-val" id="f-sliced">0</div>
          <div class="stat-lbl">切中</div>
        </div>
      </div>
      <div style="color:#666;font-size:13px" id="f-best">最佳: 0</div>
      <div class="record-badge" id="f-rec">🏆 新纪录！</div>
      <button class="btn" onclick="startGame()">再来一次</button>
      <br>
      <button class="btn-ghost" onclick="shareScore()">📤 分享成绩</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    let W, H;

    // ── Fruit definitions with canvas drawing ──
    const FRUIT_DEFS = [
      { name: '苹果', color: '#ef4444', highlight: '#fca5a5', shape: 'circle', leaf: true },
      { name: '橙子', color: '#f97316', highlight: '#fdba74', shape: 'circle', leaf: false },
      { name: '柠檬', color: '#eab308', highlight: '#fde047', shape: 'oval', leaf: true },
      { name: '葡萄', color: '#8b5cf6', highlight: '#c4b5fd', shape: 'circle', leaf: false },
      { name: '西瓜', color: '#22c55e', highlight: '#86efac', shape: 'circle', leaf: false },
      { name: '草莓', color: '#f43f5e', highlight: '#fda4af', shape: 'triangle', leaf: true },
      { name: '桃子', color: '#fb923c', highlight: '#fed7aa', shape: 'circle', leaf: true },
      { name: '猕猴桃', color: '#65a30d', highlight: '#bef264', shape: 'circle', leaf: false },
    ];

    const LB_KEY = 'shipmicro_fs_v2';
    let fruits = [], particles = [], sliceTrail = [], bgStars = [];
    let score = 0, combo = 0, maxCombo = 0, lives = 3, totalSliced = 0;
    let isPlaying = false, spawnTimer = 0, difficulty = 1;
    let screenShake = 0, slowMo = 1;

    // ── Audio ──
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new AudioCtx() }

    function playSlice(pitch = 1) {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime((500 + Math.random() * 300) * pitch, audioCtx.currentTime);
      o.frequency.exponentialRampToValueAtTime(1400 * pitch, audioCtx.currentTime + .06);
      g.gain.setValueAtTime(.15, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + .12);
      o.start(); o.stop(audioCtx.currentTime + .12);
    }

    function playCombo() {
      if (!audioCtx) return;
      [660, 880, 1100].forEach((f, i) => {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine'; o.frequency.value = f;
        g.gain.setValueAtTime(.1, audioCtx.currentTime + i * .06);
        g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + i * .06 + .1);
        o.start(audioCtx.currentTime + i * .06);
        o.stop(audioCtx.currentTime + i * .06 + .1);
      });
    }

    function playMiss() {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sawtooth'; o.frequency.value = 120;
      g.gain.setValueAtTime(.12, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + .35);
      o.start(); o.stop(audioCtx.currentTime + .35);
    }

    function playBomb() {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sawtooth'; o.frequency.setValueAtTime(200, audioCtx.currentTime);
      o.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + .5);
      g.gain.setValueAtTime(.25, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + .5);
      o.start(); o.stop(audioCtx.currentTime + .5);
    }

    // ── Mobile detection ──
    const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || window.innerWidth < 768;
    const MAX_PARTICLES = isMobile ? 40 : 100;

    // ── Resize (capped DPI) ──
    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      // Regenerate background stars
      bgStars = Array.from({ length: isMobile ? 25 : 60 }, () => ({
        x: Math.random() * W, y: Math.random() * H,
        s: Math.random() * 1.5 + .5, a: Math.random() * .3 + .05,
        speed: Math.random() * .3 + .1
      }));
    }
    window.addEventListener('resize', resize);
    resize();

    // ── Pause when backgrounded (don't endGame — iframe focus is unreliable) ──
    let _rafId = 0;
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && isPlaying) { cancelAnimationFrame(_rafId); }
    });

    // ── Storage ──
    function getBest() { try { return parseInt(localStorage.getItem(LB_KEY) || '0') } catch { return 0 } }
    function saveBest(s) { try { localStorage.setItem(LB_KEY, Math.max(s, getBest())) } catch { } }

    // ── Draw fruit shapes on canvas ──
    function drawFruit(x, y, size, def, rotation, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(x, y);
      ctx.rotate(rotation);

      const r = size / 2;

      // Shadow (disabled on mobile for performance)
      if (!isMobile) {
        ctx.shadowColor = def.color;
        ctx.shadowBlur = 15;
      }

      // Main body — solid color on mobile, gradient on desktop
      if (isMobile) {
        ctx.fillStyle = def.color;
      } else {
        const grad = ctx.createRadialGradient(-r * .2, -r * .2, r * .1, 0, 0, r);
        grad.addColorStop(0, def.highlight);
        grad.addColorStop(.7, def.color);
        grad.addColorStop(1, darken(def.color, 30));
        ctx.fillStyle = grad;
      }

      if (def.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();
      } else if (def.shape === 'oval') {
        ctx.beginPath();
        ctx.ellipse(0, 0, r, r * .7, 0, 0, Math.PI * 2);
        ctx.fill();
      } else if (def.shape === 'triangle') {
        ctx.beginPath();
        ctx.moveTo(0, -r);
        ctx.quadraticCurveTo(r, -r * .2, r * .7, r * .6);
        ctx.quadraticCurveTo(0, r * 1.1, -r * .7, r * .6);
        ctx.quadraticCurveTo(-r, -r * .2, 0, -r);
        ctx.fill();
      }

      // Shine — skip on mobile
      ctx.shadowBlur = 0;
      if (!isMobile) {
        const shine = ctx.createRadialGradient(-r * .25, -r * .3, 0, -r * .25, -r * .3, r * .5);
        shine.addColorStop(0, 'rgba(255,255,255,.4)');
        shine.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = shine;
        ctx.beginPath();
        ctx.arc(-r * .25, -r * .3, r * .4, 0, Math.PI * 2);
        ctx.fill();
      }

      // Leaf
      if (def.leaf) {
        ctx.fillStyle = '#22c55e';
        ctx.beginPath();
        ctx.ellipse(0, -r * .9, r * .15, r * .35, .3, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function darken(hex, amount) {
      const n = parseInt(hex.slice(1), 16);
      const r = Math.max(0, (n >> 16) - amount);
      const g = Math.max(0, ((n >> 8) & 0xff) - amount);
      const b = Math.max(0, (n & 0xff) - amount);
      return `rgb(${r},${g},${b})`;
    }

    // ── Fruit class ──
    class Fruit {
      constructor(isBomb = false, isGolden = false) {
        this.def = FRUIT_DEFS[Math.random() * FRUIT_DEFS.length | 0];
        this.isBomb = isBomb;
        this.isGolden = isGolden;
        this.x = Math.random() * (W - 120) + 60;
        this.y = H + 50;
        this.vx = (Math.random() - .5) * 4;
        this.vy = -(13 + Math.random() * 5 + difficulty * 1.5);
        this.size = 50 + Math.random() * 16;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - .5) * .08;
        this.sliced = false;
        this.missed = false;
        this.alpha = 1;
        this.glowPhase = Math.random() * Math.PI * 2;
      }

      update() {
        this.vy += .28 * slowMo;
        this.x += this.vx * slowMo;
        this.y += this.vy * slowMo;
        this.rotation += this.rotSpeed * slowMo;
        this.glowPhase += .05;

        if (this.y > H + 70 && !this.sliced && !this.missed) {
          this.missed = true;
          if (!this.isBomb) {
            lives--;
            combo = 0;
            playMiss();
            screenShake = 8;
            // Spawn miss indicator
            particles.push({
              x: this.x, y: H - 50, vx: 0, vy: -2, life: 1,
              text: '❌ 漏掉了!', isText: true, color: '#ef4444', size: 18
            });
            updateHUD();
          }
        }
        return this.y < H + 90 && this.alpha > 0;
      }

      draw() {
        if (this.isBomb) {
          ctx.save();
          ctx.globalAlpha = this.alpha;
          ctx.translate(this.x, this.y);
          ctx.rotate(this.rotation);
          // Bomb glow
          ctx.shadowColor = '#ef4444';
          ctx.shadowBlur = 20 + Math.sin(this.glowPhase) * 10;
          ctx.font = `${this.size}px serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('💣', 0, 0);
          ctx.restore();
        } else if (this.isGolden) {
          // Golden glow
          ctx.save();
          ctx.globalAlpha = this.alpha * (.6 + Math.sin(this.glowPhase) * .4);
          ctx.translate(this.x, this.y);
          const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
          glow.addColorStop(0, 'rgba(245,158,11,.3)');
          glow.addColorStop(1, 'rgba(245,158,11,0)');
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(0, 0, this.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
          drawFruit(this.x, this.y, this.size * 1.1, this.def, this.rotation, this.alpha);
          // Star indicator
          ctx.save();
          ctx.globalAlpha = this.alpha;
          ctx.font = '16px serif';
          ctx.textAlign = 'center';
          ctx.fillText('⚡', this.x, this.y - this.size / 2 - 8);
          ctx.restore();
        } else {
          drawFruit(this.x, this.y, this.size, this.def, this.rotation, this.alpha);
        }
      }

      slice() {
        if (this.sliced) return;
        this.sliced = true;

        if (this.isBomb) {
          playBomb();
          screenShake = 20;
          // Big explosion (fewer on mobile)
          const bombCount = isMobile ? 12 : 30;
          for (let i = 0; i < bombCount; i++) {
            const a = Math.random() * Math.PI * 2, sp = 3 + Math.random() * 8;
            particles.push({
              x: this.x, y: this.y,
              vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
              life: 1, color: i % 2 ? '#ef4444' : '#f97316', size: 4 + Math.random() * 4
            });
          }
          particles.push({
            x: this.x, y: this.y - 30, vx: 0, vy: -2, life: 1.5,
            text: '💣 爆炸!', isText: true, color: '#ef4444', size: 24
          });
          lives = 0;
          this.alpha = 0;
          updateHUD();
          return;
        }

        combo++;
        totalSliced++;
        if (combo > maxCombo) maxCombo = combo;

        const multiplier = this.isGolden ? 2 : 1;
        const comboMult = combo >= 5 ? combo : combo >= 3 ? Math.ceil(combo * .7) : 1;
        const pts = 10 * comboMult * multiplier;
        score += pts;

        playSlice(this.isGolden ? 1.3 : 1);
        if (combo >= 5) playCombo();
        screenShake = 3;

        // Juice particles — fruit halves + sparkles
        const halfCount = 2;
        for (let h = 0; h < halfCount; h++) {
          const angle = this.rotation + (h === 0 ? -.5 : .5);
          particles.push({
            x: this.x, y: this.y,
            vx: Math.cos(angle) * 4 * (h === 0 ? -1 : 1),
            vy: -2 + Math.random() * 2,
            life: 1, isFruitHalf: true,
            def: this.def, size: this.size * .5,
            rotation: this.rotation, rotSpeed: (Math.random() - .5) * .15,
            gravity: .15
          });
        }

        // Color burst (fewer on mobile)
        const burstCount = isMobile ? 6 : 14;
        for (let i = 0; i < burstCount; i++) {
          const a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 6;
          particles.push({
            x: this.x, y: this.y,
            vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
            life: 1, color: this.def.color, size: 2 + Math.random() * 4
          });
        }

        // Juice drops (fewer on mobile)
        const dropCount = isMobile ? 2 : 6;
        for (let i = 0; i < dropCount; i++) {
          particles.push({
            x: this.x + (Math.random() - .5) * 30,
            y: this.y + (Math.random() - .5) * 30,
            vx: (Math.random() - .5) * 3,
            vy: Math.random() * 3 + 1,
            life: 1, color: this.def.highlight, size: 2 + Math.random() * 3,
            gravity: .08
          });
        }

        // Score text
        const comboText = combo >= 5 ? `+${pts} 🔥x${combo}` : combo >= 3 ? `+${pts} x${combo}` : `+${pts}`;
        const textColor = this.isGolden ? '#f59e0b' : combo >= 5 ? '#f97316' : '#fff';
        particles.push({
          x: this.x, y: this.y - 35, vx: 0, vy: -2, life: 1.2,
          text: comboText, isText: true, color: textColor, size: combo >= 5 ? 22 : 18
        });

        this.alpha = 0;
        updateHUD();
      }
    }

    // ── Spawning ──
    function spawnWave() {
      const count = 1 + Math.floor(difficulty / 2.5);
      const hasBomb = difficulty > 3 && Math.random() < .12;
      const hasGolden = Math.random() < .08;

      for (let i = 0; i < count; i++) {
        setTimeout(() => {
          if (i === count - 1 && hasBomb) fruits.push(new Fruit(true, false));
          else if (i === 0 && hasGolden) fruits.push(new Fruit(false, true));
          else fruits.push(new Fruit());
        }, i * 120);
      }
    }

    function updateHUD() {
      document.getElementById('h-score').textContent = score;
      document.getElementById('h-combo').textContent = combo >= 3 ? `🔥 x${combo}` : '—';
      document.getElementById('h-lives').textContent = '❤️'.repeat(Math.max(0, lives));
    }

    // ── Input ──
    let isDown = false;
    function ptrDown(e) {
      const p = e.touches ? e.touches[0] : e;
      isDown = true;
      sliceTrail = [{ x: p.clientX, y: p.clientY, t: Date.now() }];
    }
    function ptrMove(e) {
      if (!isDown || !isPlaying) return;
      e.preventDefault();
      const p = e.touches ? e.touches[0] : e;
      const cx = p.clientX, cy = p.clientY;
      sliceTrail.push({ x: cx, y: cy, t: Date.now() });
      if (sliceTrail.length > 30) sliceTrail.shift();

      // Check collision with last two points
      if (sliceTrail.length >= 2) {
        const prev = sliceTrail[sliceTrail.length - 2];
        const speed = Math.sqrt((cx - prev.x) ** 2 + (cy - prev.y) ** 2);
        if (speed > 4) {
          fruits.forEach(f => {
            if (!f.sliced && !f.missed) {
              const dist = Math.sqrt((f.x - cx) ** 2 + (f.y - cy) ** 2);
              if (dist < f.size * .65) f.slice();
            }
          });
        }
      }
    }
    function ptrUp() { isDown = false; sliceTrail = [] }

    canvas.addEventListener('mousedown', ptrDown);
    canvas.addEventListener('mousemove', ptrMove);
    canvas.addEventListener('mouseup', ptrUp);
    canvas.addEventListener('touchstart', ptrDown, { passive: false });
    canvas.addEventListener('touchmove', ptrMove, { passive: false });
    canvas.addEventListener('touchend', ptrUp);

    // ── Draw slice trail ──
    function drawTrail() {
      if (sliceTrail.length < 2) return;
      const now = Date.now();

      // Outer glow
      ctx.beginPath();
      ctx.moveTo(sliceTrail[0].x, sliceTrail[0].y);
      for (let i = 1; i < sliceTrail.length; i++) {
        ctx.lineTo(sliceTrail[i].x, sliceTrail[i].y);
      }
      ctx.strokeStyle = 'rgba(249,115,22,.15)';
      ctx.lineWidth = 16;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();

      // Main trail
      ctx.beginPath();
      ctx.moveTo(sliceTrail[0].x, sliceTrail[0].y);
      for (let i = 1; i < sliceTrail.length; i++) {
        const age = (now - sliceTrail[i].t) / 150;
        const alpha = Math.max(0, 1 - age);
        ctx.strokeStyle = `rgba(255,255,255,${alpha * .8})`;
        ctx.lineWidth = 3 * (1 - age * .5);
        ctx.lineTo(sliceTrail[i].x, sliceTrail[i].y);
      }
      ctx.stroke();
    }

    // ── Game loop ──
    function gameLoop() {
      if (!isPlaying) return;
      ctx.clearRect(0, 0, W, H);

      // Screen shake
      if (screenShake > 0) {
        ctx.save();
        ctx.translate((Math.random() - .5) * screenShake, (Math.random() - .5) * screenShake);
        screenShake *= .85;
        if (screenShake < .5) screenShake = 0;
      }

      // Background
      ctx.fillStyle = '#050510';
      ctx.fillRect(0, 0, W, H);

      // Ambient stars
      bgStars.forEach(s => {
        s.y += s.speed;
        if (s.y > H) { s.y = -5; s.x = Math.random() * W }
        ctx.globalAlpha = s.a;
        ctx.fillStyle = '#fff';
        ctx.fillRect(s.x, s.y, s.s, s.s);
      });
      ctx.globalAlpha = 1;

      // Spawn
      spawnTimer++;
      const interval = Math.max(25, 70 - difficulty * 4);
      if (spawnTimer >= interval) {
        spawnTimer = 0;
        spawnWave();
        difficulty = Math.min(12, 1 + score / 80);
      }

      // Draw slice trail
      drawTrail();

      // Update & draw fruits
      fruits = fruits.filter(f => f.update());
      fruits.forEach(f => f.draw());

      // Update & draw particles
      // Cap particles for mobile performance
      if (particles.length > MAX_PARTICLES) particles.splice(0, particles.length - MAX_PARTICLES);
      particles = particles.filter(p => {
        p.life -= .018;
        p.x += (p.vx || 0);
        p.y += (p.vy || 0);
        if (p.gravity) p.vy += p.gravity;

        if (p.isFruitHalf) {
          p.vy += p.gravity || .15;
          p.rotation += p.rotSpeed;
          ctx.save();
          ctx.globalAlpha = p.life;
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rotation);
          // Simple solid color on mobile, gradient on desktop
          if (isMobile) {
            ctx.fillStyle = p.def.color;
          } else {
            const grad = ctx.createRadialGradient(-p.size * .1, -p.size * .1, 0, 0, 0, p.size);
            grad.addColorStop(0, p.def.highlight);
            grad.addColorStop(1, p.def.color);
            ctx.fillStyle = grad;
          }
          ctx.beginPath();
          ctx.arc(0, 0, p.size, 0, Math.PI);
          ctx.fill();
          // Inner flesh — skip on mobile
          if (!isMobile) {
            ctx.fillStyle = 'rgba(255,255,255,.25)';
            ctx.beginPath();
            ctx.arc(0, 0, p.size * .7, 0, Math.PI);
            ctx.fill();
          }
          ctx.restore();
        } else if (p.isText) {
          ctx.save();
          ctx.globalAlpha = Math.min(1, p.life * 2);
          ctx.font = `bold ${p.size || 18}px sans-serif`;
          ctx.fillStyle = p.color || '#fff';
          ctx.textAlign = 'center';
          if (!isMobile) { ctx.shadowColor = p.color || '#fff'; ctx.shadowBlur = 8; }
          ctx.fillText(p.text, p.x, p.y);
          ctx.restore();
        } else {
          ctx.save();
          ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          if (!isMobile) { ctx.shadowColor = p.color; ctx.shadowBlur = 6; }
          ctx.beginPath();
          ctx.arc(p.x, p.y, (p.size || 3) * p.life, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
        return p.life > 0;
      });

      if (screenShake > 0) ctx.restore();

      if (lives <= 0) { endGame(); return }
      _rafId = requestAnimationFrame(gameLoop);
    }

    // ── Start / End ──
    function startGame() {
      initAudio();
      score = 0; combo = 0; maxCombo = 0; lives = 3; totalSliced = 0;
      difficulty = 1; spawnTimer = 0; slowMo = 1; screenShake = 0;
      fruits = []; particles = []; sliceTrail = [];
      isPlaying = true;
      document.getElementById('start-ov').classList.add('hidden');
      document.getElementById('end-ov').classList.add('hidden');
      document.getElementById('hud').classList.remove('hidden');
      updateHUD();
      gameLoop();
    }

    function endGame() {
      isPlaying = false;
      const best = getBest();
      const isNew = score > best;
      saveBest(score);
      document.getElementById('f-score').textContent = score;
      document.getElementById('f-combo').textContent = 'x' + maxCombo;
      document.getElementById('f-sliced').textContent = totalSliced;
      document.getElementById('f-best').textContent = `最佳: ${Math.max(score, best)}`;
      document.getElementById('f-rec').classList.toggle('show', isNew);
      document.getElementById('end-ov').classList.remove('hidden');
      document.getElementById('hud').classList.add('hidden');
    }

    function shareScore() {
      const t = `🍉 水果忍者: ${score}分! 🔥最高连击 x${maxCombo}\n🎮 来ShipMicro玩: ${location.origin}/arcade`;
      if (navigator.share) navigator.share({ title: '水果忍者', text: t });
      else navigator.clipboard.writeText(t).then(() => alert('已复制到剪贴板!'));
    }
  </script>
</body>

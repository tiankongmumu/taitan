<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>打地鼠 — ShipMicro 游戏厅</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: #050510;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      touch-action: manipulation;
      user-select: none;
    }

    .game-container {
      max-width: 600px;
      margin: 0 auto;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: 12px 16px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      padding-bottom: 8px
    }

    .logo {
      font-size: 13px;
      color: #666
    }

    .logo a {
      color: inherit;
      text-decoration: none
    }

    .stats {
      display: flex;
      gap: 16px
    }

    .stat {
      text-align: center
    }

    .stat-value {
      font-size: 20px;
      font-weight: 900;
      background: linear-gradient(135deg, #06b6d4, #22c55e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent
    }

    .stat-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #444
    }

    /* Info bar */
    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      padding: 4px 0 8px
    }

    .level {
      font-size: 13px;
      color: #666;
      font-weight: 700
    }

    .combo {
      font-size: 14px;
      color: #f59e0b;
      font-weight: 800;
      text-shadow: 0 0 8px rgba(245, 158, 11, .4);
      min-width: 60px;
      text-align: center
    }

    .best-display {
      font-size: 12px;
      color: #555
    }

    /* Game Board */
    .game-board {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 14px;
      padding: 8px 0;
      min-height: 0;
    }

    .hole {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(255, 255, 255, .02), rgba(255, 255, 255, .01));
      border: 2px solid rgba(255, 255, 255, .04);
      cursor: pointer;
      transition: all .2s;
    }

    .hole:active {
      transform: scale(.96)
    }

    /* Hole ground */
    .hole-ground {
      position: absolute;
      bottom: 0;
      left: 10%;
      right: 10%;
      height: 30%;
      background: radial-gradient(ellipse at center, rgba(139, 92, 246, .1) 0%, transparent 70%);
      border-radius: 50%;
    }

    /* Mole */
    .mole {
      position: absolute;
      bottom: -100%;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      transition: bottom .2s ease-out;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
    }

    .mole-body {
      font-size: clamp(44px, 12vw, 72px);
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, .5));
      transition: transform .1s;
    }

    .hole.active .mole {
      bottom: 15%
    }

    .hole.hit .mole {
      bottom: -100%;
      transition: bottom .1s ease-in
    }

    .hole.hit .mole-body {
      transform: scale(1.3) rotate(15deg)
    }

    /* Golden mole */
    .hole.golden .mole-body {
      filter: drop-shadow(0 0 15px rgba(245, 158, 11, .6))
    }

    /* Hit flash */
    .hit-flash {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(6, 182, 212, .4) 0%, transparent 70%);
      opacity: 0;
      pointer-events: none;
      z-index: 3;
      transition: opacity .1s;
    }

    .hole.hit .hit-flash {
      opacity: 1;
      animation: hitPop .3s
    }

    .hole.golden.hit .hit-flash {
      background: radial-gradient(circle, rgba(245, 158, 11, .4) 0%, transparent 70%)
    }

    @keyframes hitPop {
      0% {
        transform: scale(.8);
        opacity: 1
      }

      100% {
        transform: scale(1.5);
        opacity: 0
      }
    }

    /* Score popup */
    .score-popup {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      font-weight: 900;
      z-index: 10;
      pointer-events: none;
      animation: scoreFloat .6s ease-out forwards;
    }

    @keyframes scoreFloat {
      0% {
        opacity: 1;
        transform: translate(-50%, 0) scale(1)
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -40px) scale(.6)
      }
    }

    /* Timer */
    .bottom-bar {
      flex-shrink: 0;
      padding: 10px 0
    }

    .timer-bar {
      height: 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, .04);
      overflow: hidden;
      position: relative
    }

    .timer-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #ef4444, #f97316, #22c55e);
      transition: width .1s linear
    }

    .timer-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: -2px;
      bottom: -2px;
      width: 10px;
      border-radius: 5px;
      background: inherit;
      box-shadow: 0 0 10px rgba(34, 197, 94, .5)
    }

    /* Particles */
    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
      animation: particleFly .5s ease-out forwards;
    }

    @keyframes particleFly {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1)
      }

      100% {
        opacity: 0;
        transform: translate(var(--tx), var(--ty)) scale(0)
      }
    }

    /* Overlays */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 5, 16, .92);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn .3s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.05)
      }
    }

    @keyframes glow {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(6, 182, 212, .2)
      }

      50% {
        box-shadow: 0 0 40px rgba(6, 182, 212, .5)
      }
    }

    .card {
      text-align: center;
      padding: 48px 36px;
      max-width: 400px;
      width: 92%;
      background: linear-gradient(135deg, rgba(6, 182, 212, .05), rgba(34, 197, 94, .05));
      border: 1px solid rgba(6, 182, 212, .15);
      border-radius: 28px;
      color: #fff;
      animation: slideUp .4s;
    }

    .card-icon {
      font-size: 80px;
      margin-bottom: 16px;
      display: block;
      animation: pulse 2s infinite
    }

    .card h2 {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 4px
    }

    .card .sub {
      color: #888;
      font-size: 13px;
      margin-bottom: 6px
    }

    .card .desc {
      color: #555;
      font-size: 12px;
      margin-bottom: 16px;
      line-height: 1.5
    }

    .card .stats-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 16px 0;
      padding: 12px 0;
      border-top: 1px solid rgba(255, 255, 255, .05);
      border-bottom: 1px solid rgba(255, 255, 255, .05)
    }

    .card .stat-item {
      text-align: center
    }

    .card .stat-val {
      font-size: 26px;
      font-weight: 900;
      background: linear-gradient(135deg, #06b6d4, #22c55e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent
    }

    .card .stat-lbl {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #555
    }

    .card .record-badge {
      color: #f59e0b;
      font-weight: 800;
      font-size: 14px;
      margin: 8px 0;
      display: none
    }

    .card .record-badge.show {
      display: block;
      animation: pulse .5s
    }

    .leaderboard {
      margin-top: 16px;
      text-align: left
    }

    .leaderboard h3 {
      font-size: 10px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px
    }

    .lb-row {
      display: flex;
      gap: 8px;
      font-size: 13px;
      padding: 4px 0;
      color: #666
    }

    .lb-row .rank {
      color: #a855f7;
      font-weight: 700;
      width: 24px
    }

    .lb-row .lb-score {
      color: #06b6d4;
      font-weight: 700
    }

    .btn {
      display: inline-block;
      padding: 16px 44px;
      border-radius: 16px;
      border: none;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(135deg, #06b6d4, #22c55e);
      color: #fff;
      margin-top: 16px;
      transition: all .2s;
      animation: glow 2s infinite
    }

    .btn:hover {
      transform: scale(1.05)
    }

    .btn:active {
      transform: scale(.97)
    }

    .btn-ghost {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 12px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08);
      color: #777;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: all .2s
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, .08)
    }

    .hidden {
      display: none !important
    }
  </style>
</head>

<body>
  <div class="game-container">
    <div class="header">
      <div class="logo"><a href="/arcade">← 游戏厅</a></div>
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="score">0</div>
          <div class="stat-label">分数</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="hits-display">0</div>
          <div class="stat-label">命中</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="misses-display">0</div>
          <div class="stat-label">漏掉</div>
        </div>
      </div>
    </div>

    <div class="game-board" id="board"></div>

    <div class="info-bar">
      <div class="level">等级 <span id="level">1</span></div>
      <div class="combo" id="combo"></div>
      <div class="best-display">最佳: <span id="best-display">0</span></div>
    </div>

    <div class="bottom-bar">
      <div class="timer-bar">
        <div class="timer-fill" id="timer-fill" style="width:100%"></div>
      </div>
    </div>
  </div>

  <!-- Start -->
  <div class="overlay" id="start-overlay">
    <div class="card">
      <span class="card-icon">🐹</span>
      <h2>打地鼠</h2>
      <div class="sub">Whack-a-Mole</div>
      <div class="desc">
        点击冒出来的地鼠! · 60秒限时挑战<br>
        连续命中获得连击加成 🔥<br>
        ⭐ 金色地鼠 = 双倍分数!
      </div>
      <button class="btn" onclick="startGame()">开始!</button>
      <br>
      <button class="btn-ghost" onclick="location.href='/arcade'">← 返回游戏厅</button>
    </div>
  </div>

  <!-- End -->
  <div class="overlay hidden" id="end-overlay">
    <div class="card">
      <span class="card-icon">🏆</span>
      <h2>时间到!</h2>
      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-val" id="final-score">0</div>
          <div class="stat-lbl">分数</div>
        </div>
        <div class="stat-item">
          <div class="stat-val" id="final-hits">0</div>
          <div class="stat-lbl">命中</div>
        </div>
        <div class="stat-item">
          <div class="stat-val" id="final-combo">0</div>
          <div class="stat-lbl">最高连击</div>
        </div>
      </div>
      <div style="color:#666;font-size:13px" id="final-accuracy">—</div>
      <div style="color:#666;font-size:13px;margin-top:4px" id="final-best">最佳: 0</div>
      <div class="record-badge" id="final-record">🏆 新纪录！</div>

      <div class="leaderboard" id="leaderboard"></div>

      <button class="btn" onclick="startGame()">再来一次</button>
      <br>
      <button class="btn-ghost" onclick="shareScore()">📤 分享成绩</button>
    </div>
  </div>

  <script>
    // ── Mobile & Audio ──
    const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || window.innerWidth < 768;
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && isPlaying) { clearTimeout(gameTimer); clearTimeout(moleTimer); }
    });

    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new AudioCtx() }

    function playHitSound() {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(600, audioCtx.currentTime);
      o.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + .05);
      g.gain.setValueAtTime(.15, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + .1);
      o.start(); o.stop(audioCtx.currentTime + .1);
    }

    function playGoldenHit() {
      if (!audioCtx) return;
      [880, 1100, 1320].forEach((f, i) => {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine'; o.frequency.value = f;
        g.gain.setValueAtTime(.12, audioCtx.currentTime + i * .06);
        g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + i * .06 + .1);
        o.start(audioCtx.currentTime + i * .06);
        o.stop(audioCtx.currentTime + i * .06 + .1);
      });
    }

    function playMissSound() {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'square'; o.frequency.value = 150;
      g.gain.setValueAtTime(.08, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + .15);
      o.start(); o.stop(audioCtx.currentTime + .15);
    }

    function playLevelUp() {
      if (!audioCtx) return;
      [523, 659, 784, 1047].forEach((f, i) => {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine'; o.frequency.value = f;
        g.gain.setValueAtTime(.1, audioCtx.currentTime + i * .08);
        g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + i * .08 + .15);
        o.start(audioCtx.currentTime + i * .08);
        o.stop(audioCtx.currentTime + i * .08 + .15);
      });
    }

    // ── Particles (reduced on mobile) ──
    function spawnParticles(x, y, color = '#06b6d4', count = 8) {
      const actualCount = isMobile ? Math.min(count, 3) : count;
      for (let i = 0; i < actualCount; i++) {
        const el = document.createElement('div'); el.className = 'particle'; const
          size = 4 + Math.random() * 6; const angle = Math.random() * Math.PI * 2; const dist = 30 + Math.random() * 40;
        el.style.cssText = `width:${size}px;height:${size}px;background:${color};left:${x}px;top:${y}px;--tx:${Math.cos(angle)
          * dist}px;--ty:${Math.sin(angle) * dist}px`; document.body.appendChild(el); setTimeout(() => el.remove(), 500);
      }
    }

    // ── Game State ──
    let score = 0, hits = 0, misses = 0, combo = 0, maxCombo = 0, level = 1;
    let gameTimer, moleTimer, timeLeft = 60;
    const GAME_DURATION = 60;
    let isPlaying = false;

    // ── Leaderboard ──
    const LB_KEY = 'shipmicro_wam_v2';
    function getLeaderboard() { try { return JSON.parse(localStorage.getItem(LB_KEY) || '[]') } catch { return [] } }
    function saveScore(s) {
      const lb = getLeaderboard(); lb.push(s);
      lb.sort((a, b) => b - a);
      try { localStorage.setItem(LB_KEY, JSON.stringify(lb.slice(0, 10))) } catch { }
    }
    function getBest() { const lb = getLeaderboard(); return lb.length ? lb[0] : 0 }

    // ── Build Board ──
    const boardEl = document.getElementById('board');
    const MOLES = ['🐹', '🐭', '🐰'];
    const holes = [];
    for (let i = 0; i < 9; i++) {
      const hole = document.createElement('div'); hole.className = 'hole'; hole.innerHTML = `
        <div class="hole-ground">
        </div>
        <div class="mole">
          <div class="mole-body">${MOLES[i % 3]}</div>
        </div>
        <div class="hit-flash"></div>
        `;
      hole.addEventListener('pointerdown', e => whack(i, e));
      boardEl.appendChild(hole);
      holes.push(hole);
    }

    document.getElementById('best-display').textContent = getBest();

    // ── Game Logic ──
    function whack(i, e) {
      if (!isPlaying) return;
      initAudio();
      const hole = holes[i];

      if (hole.classList.contains('active') && !hole.classList.contains('hit')) {
        hole.classList.add('hit');
        const isGolden = hole.classList.contains('golden');
        const multiplier = isGolden ? 2 : 1;
        combo++;
        if (combo > maxCombo) maxCombo = combo;
        hits++;
        const comboMult = combo >= 5 ? combo : combo >= 3 ? Math.ceil(combo * .7) : 1;
        const points = 10 * comboMult * multiplier;
        score += points;

        if (isGolden) playGoldenHit();
        else playHitSound();

        // Score popup
        const popup = document.createElement('div');
        popup.className = 'score-popup';
        popup.style.color = isGolden ? '#f59e0b' : combo >= 5 ? '#f97316' : '#06b6d4';
        popup.textContent = combo >= 3 ? `+${points} x${combo}` : `+${points}`;
        hole.appendChild(popup);
        setTimeout(() => popup.remove(), 600);

        // Particles
        const rect = hole.getBoundingClientRect();
        spawnParticles(
          rect.left + rect.width / 2,
          rect.top + rect.height / 2,
          isGolden ? '#f59e0b' : '#06b6d4',
          isGolden ? 12 : 8
        );

        updateDisplay();

        // Level up
        const newLevel = Math.floor(hits / 8) + 1;
        if (newLevel > level) { level = newLevel; playLevelUp() }
      }
    }

    function showMole() {
      if (!isPlaying) return;

      // Count active moles
      const active = holes.filter(h => h.classList.contains('active'));
      const maxActive = Math.min(3, 1 + Math.floor(level / 3));

      if (active.length >= maxActive) {
        // Still schedule next check even when max active!
        const retryDelay = Math.max(200, 800 - level * 40);
        moleTimer = setTimeout(showMole, retryDelay + Math.random() * 300);
        return;
      }

      // Pick random inactive hole
      const inactive = holes.map((h, i) => i).filter(i => !holes[i].classList.contains('active'));
      if (!inactive.length) return;

      const idx = inactive[Math.floor(Math.random() * inactive.length)];
      const hole = holes[idx];
      const isGolden = Math.random() < .1;
      hole.classList.add('active');
      hole.classList.remove('hit');
      if (isGolden) hole.classList.add('golden');

      // Mole face
      const body = hole.querySelector('.mole-body');
      body.textContent = isGolden ? '⭐' : MOLES[Math.floor(Math.random() * MOLES.length)];

      // Show duration decreases with level
      const showTime = Math.max(400, 1200 - level * 60);
      setTimeout(() => {
        if (hole.classList.contains('active') && !hole.classList.contains('hit')) {
          misses++;
          combo = 0;
          playMissSound();
          updateDisplay();
        }
        hole.classList.remove('active', 'hit', 'golden');
      }, showTime);

      // Schedule next
      const nextDelay = Math.max(200, 800 - level * 40);
      moleTimer = setTimeout(showMole, nextDelay + Math.random() * 400);
    }

    function updateDisplay() {
      document.getElementById('score').textContent = score;
      document.getElementById('hits-display').textContent = hits;
      document.getElementById('misses-display').textContent = misses;
      document.getElementById('level').textContent = level;
      if (combo >= 5) document.getElementById('combo').textContent = `🔥🔥 x${combo}`;
      else if (combo >= 3) document.getElementById('combo').textContent = `🔥 x${combo}`;
      else document.getElementById('combo').textContent = '';
    }

    function updateTimer() {
      timeLeft -= .1;
      const pct = Math.max(0, timeLeft / GAME_DURATION * 100);
      const fill = document.getElementById('timer-fill');
      fill.style.width = pct + '%';
      if (pct < 20) fill.style.background = 'linear-gradient(90deg, #ef4444, #f97316)';
      else if (pct < 50) fill.style.background = 'linear-gradient(90deg, #f97316, #eab308, #22c55e)';

      if (timeLeft <= 0) { endGame(); return; }
      gameTimer = setTimeout(updateTimer, 100);
    }

    function startGame() {
      initAudio();
      score = 0; hits = 0; misses = 0; combo = 0; maxCombo = 0; level = 1;
      timeLeft = GAME_DURATION; isPlaying = true;
      holes.forEach(h => h.classList.remove('active', 'hit', 'golden'));
      document.getElementById('start-overlay').classList.add('hidden');
      document.getElementById('end-overlay').classList.add('hidden');
      document.getElementById('timer-fill').style.width = '100%';
      document.getElementById('timer-fill').style.background = 'linear-gradient(90deg, #ef4444, #f97316, #22c55e)';

      updateDisplay();
      showMole();
      updateTimer();
    }

    function endGame() {
      isPlaying = false;
      clearTimeout(gameTimer);
      clearTimeout(moleTimer);
      holes.forEach(h => h.classList.remove('active', 'hit', 'golden'));

      const best = getBest();
      const isNew = score > best;
      saveScore(score);

      document.getElementById('final-score').textContent = score;
      document.getElementById('final-hits').textContent = hits;
      document.getElementById('final-combo').textContent = 'x' + maxCombo;
      const total = hits + misses;
      document.getElementById('final-accuracy').textContent = total > 0 ? `命中率: ${Math.round(hits / total * 100)}%
            · 等级 ${level}` : '';
      document.getElementById('final-best').textContent = `最佳: ${Math.max(score, best)}`;
      document.getElementById('final-record').classList.toggle('show', isNew);
      document.getElementById('best-display').textContent = Math.max(score, best);

      // Leaderboard
      const lb = getLeaderboard();
      const lbEl = document.getElementById('leaderboard');
      if (lb.length > 1) {
        lbEl.innerHTML = '<h3>📊 排行榜</h3>' + lb.slice(0, 5).map((s, i) =>
          `<div class="lb-row"><span class="rank">#${i + 1}</span><span class="lb-score">${s}</span><span>${s ===
            score ? '← 本次' : ''}</span></div>`
        ).join('');
      } else {
        lbEl.innerHTML = '';
      }

      document.getElementById('end-overlay').classList.remove('hidden');
    }

    function shareScore() {
      const t = `🐹 打地鼠: ${score}分!\n✅ 命中${hits}次 · 🔥最高连击 x${maxCombo} · 等级${level}\n🎮 来ShipMicro玩:
            ${location.origin}/arcade`;
      if (navigator.share) navigator.share({ title: '打地鼠', text: t });
      else navigator.clipboard.writeText(t).then(() => alert('已复制到剪贴板!'));
    }
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>йҷЁзҹій—ӘйҒҝ вҖ” ShipMicro жёёжҲҸеҺ…</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      background: #020210;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      font-family: 'Segoe UI', system-ui, sans-serif
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 2, 16, .92);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn .3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.05)
      }
    }

    @keyframes glow {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(6, 182, 212, .2)
      }

      50% {
        box-shadow: 0 0 40px rgba(6, 182, 212, .5)
      }
    }

    .card {
      text-align: center;
      padding: 48px 36px;
      max-width: 400px;
      width: 92%;
      background: linear-gradient(135deg, rgba(6, 182, 212, .05), rgba(139, 92, 246, .05));
      border: 1px solid rgba(6, 182, 212, .15);
      border-radius: 28px;
      color: #fff;
      animation: slideUp .4s ease;
    }

    .card-icon {
      font-size: 80px;
      margin-bottom: 16px;
      display: block;
      animation: pulse 2s infinite
    }

    .card h2 {
      font-size: 32px;
      font-weight: 900;
      margin-bottom: 4px
    }

    .card .sub {
      color: #888;
      font-size: 13px;
      margin-bottom: 6px
    }

    .card .desc {
      color: #555;
      font-size: 12px;
      margin-bottom: 16px;
      line-height: 1.5
    }

    .card .stats-row {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin: 16px 0;
      padding: 12px 0;
      border-top: 1px solid rgba(255, 255, 255, .05);
      border-bottom: 1px solid rgba(255, 255, 255, .05)
    }

    .card .stat-item {
      text-align: center
    }

    .card .stat-val {
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(135deg, #06b6d4, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent
    }

    .card .stat-lbl {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #555
    }

    .card .record-badge {
      color: #f59e0b;
      font-weight: 800;
      font-size: 14px;
      margin: 8px 0;
      display: none
    }

    .card .record-badge.show {
      display: block;
      animation: pulse .5s
    }

    .btn {
      display: inline-block;
      padding: 16px 44px;
      border-radius: 16px;
      border: none;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      background: linear-gradient(135deg, #06b6d4, #8b5cf6);
      color: #fff;
      margin-top: 16px;
      transition: all .2s;
      animation: glow 2s infinite;
    }

    .btn:hover {
      transform: scale(1.05)
    }

    .btn:active {
      transform: scale(.97)
    }

    .btn-ghost {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 12px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08);
      color: #777;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: all .2s
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, .08);
      color: #aaa
    }

    .hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      z-index: 50;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(2, 2, 16, .7) 0%, transparent 100%);
    }

    .hud-item {
      text-align: center
    }

    .hud-val {
      font-size: 22px;
      font-weight: 900;
      color: #06b6d4;
      text-shadow: 0 0 10px rgba(6, 182, 212, .4)
    }

    .hud-lbl {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #334
    }

    .hidden {
      display: none !important
    }
  </style>
</head>

<body>
  <div class="hud hidden" id="hud">
    <div class="hud-item">
      <div class="hud-val" id="h-time">0</div>
      <div class="hud-lbl">ж—¶й—ҙ</div>
    </div>
    <div class="hud-item">
      <div class="hud-val" id="h-score">0</div>
      <div class="hud-lbl">еҲҶж•°</div>
    </div>
    <div class="hud-item">
      <div class="hud-val" id="h-shield">рҹӣЎпёҸГ—3</div>
      <div class="hud-lbl">жҠӨзӣҫ</div>
    </div>
  </div>
  <canvas id="c"></canvas>

  <div class="overlay" id="start-ov">
    <div class="card">
      <span class="card-icon">рҹҡҖ</span>
      <h2>йҷЁзҹій—ӘйҒҝ</h2>
      <div class="sub">Meteor Dodge</div>
      <div class="desc">
        з§»еҠЁйЈһиҲ№иәІйҒҝйҷЁзҹі В· ж”¶йӣҶ вӯҗ иҺ·еҫ—еҠ еҲҶ<br>
        3еұӮжҠӨзӣҫ В· ж’һеҲ°йҷЁзҹіж¶ҲиҖ—жҠӨзӣҫ<br>
        еқҡжҢҒи¶Ҡд№…еҲҶж•°и¶Ҡй«ҳпјҒ
      </div>
      <button class="btn" onclick="startGame()">еҸ‘е°„!</button>
      <br>
      <button class="btn-ghost" onclick="location.href='/arcade'">вҶҗ иҝ”еӣһжёёжҲҸеҺ…</button>
    </div>
  </div>

  <div class="overlay hidden" id="end-ov">
    <div class="card">
      <span class="card-icon">рҹ’Ҙ</span>
      <h2>йЈһиҲ№иў«жҜҒ!</h2>
      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-val" id="f-score">0</div>
          <div class="stat-lbl">еҲҶж•°</div>
        </div>
        <div class="stat-item">
          <div class="stat-val" id="f-time">0</div>
          <div class="stat-lbl">еӯҳжҙ»ж—¶й—ҙ</div>
        </div>
        <div class="stat-item">
          <div class="stat-val" id="f-stars">0</div>
          <div class="stat-lbl">жҳҹжҳҹ</div>
        </div>
      </div>
      <div style="color:#666;font-size:13px" id="f-best">жңҖдҪі: 0</div>
      <div class="record-badge" id="f-rec">рҹҸҶ ж–°зәӘеҪ•пјҒ</div>
      <button class="btn" onclick="startGame()">еҶҚжқҘдёҖж¬Ў</button>
      <br>
      <button class="btn-ghost" onclick="shareScore()">рҹ“Ө еҲҶдә«жҲҗз»©</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
    let W, H;
    const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent) || window.innerWidth < 768;
    const MAX_P = isMobile ? 40 : 120;
    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth; H = window.innerHeight;
      canvas.width = W * dpr; canvas.height = H * dpr;
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resize); resize();
    let _rafId = 0;
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && isPlaying) { isPlaying = false; cancelAnimationFrame(_rafId); }
    });

    const LB = 'shipmicro_md_v2';
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    function initAudio() { if (!audioCtx) audioCtx = new AudioCtx() }

    function playHit() {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sawtooth'; o.frequency.setValueAtTime(200, audioCtx.currentTime);
      o.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + .3);
      g.gain.setValueAtTime(.2, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + .3);
      o.start(); o.stop(audioCtx.currentTime + .3);
    }

    function playStar() {
      if (!audioCtx) return;
      [660, 880, 1100].forEach((f, i) => {
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine'; o.frequency.value = f;
        g.gain.setValueAtTime(.12, audioCtx.currentTime + i * .06);
        g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + i * .06 + .1);
        o.start(audioCtx.currentTime + i * .06);
        o.stop(audioCtx.currentTime + i * .06 + .1);
      });
    }

    function playExplode() {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sawtooth'; o.frequency.setValueAtTime(300, audioCtx.currentTime);
      o.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + .6);
      g.gain.setValueAtTime(.3, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + .6);
      o.start(); o.stop(audioCtx.currentTime + .6);
    }

    function getBest() { try { return parseInt(localStorage.getItem(LB) || '0') } catch { return 0 } }
    function saveBest(s) { try { localStorage.setItem(LB, Math.max(s, getBest())) } catch { } }

    // Game state
    let ship, meteors, stars_, particles, engineTrail;
    let score, shields, elapsed, isPlaying, difficulty, starsCollected, invulnTimer;
    let ptrX = null, ptrY = null;
    let screenShake = 0;

    // Background
    const bgStars = Array.from({ length: isMobile ? 40 : 150 }, () => ({
      x: Math.random() * 2000, y: Math.random() * 2000,
      s: Math.random() * 2 + .3, sp: Math.random() * 1.5 + .3,
      a: Math.random() * .4 + .1,
      twinkle: Math.random() * Math.PI * 2
    }));

    // Nebula colors
    const nebulaPhase = { r: 0 };

    // в”Җв”Җ Draw ship в”Җв”Җ
    function drawShip(x, y, size) {
      ctx.save();
      ctx.translate(x, y);

      if (isMobile) {
        // Simple solid ship on mobile вҖ” no gradients
        // Engine glow
        ctx.globalAlpha = .3;
        ctx.fillStyle = '#06b6d4';
        ctx.beginPath();
        ctx.arc(0, size + 5, size * .8, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;

        // Ship body
        ctx.fillStyle = '#0891b2';
        ctx.beginPath();
        ctx.moveTo(0, -size);
        ctx.quadraticCurveTo(size * .8, -size * .2, size * .6, size * .6);
        ctx.lineTo(size * .3, size);
        ctx.lineTo(-size * .3, size);
        ctx.lineTo(-size * .6, size * .6);
        ctx.quadraticCurveTo(-size * .8, -size * .2, 0, -size);
        ctx.fill();

        // Cockpit
        ctx.fillStyle = 'rgba(255,255,255,.4)';
        ctx.beginPath();
        ctx.arc(0, -size * .2, size * .2, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
        return;
      }

      // Desktop: full gradient rendering
      ctx.beginPath();
      ctx.ellipse(0, -size * .2, size * .2, size * .3, 0, 0, Math.PI * 2);
      ctx.fill();

      // Wings
      ctx.fillStyle = '#0e7490';
      ctx.beginPath();
      ctx.moveTo(-size * .5, size * .3);
      ctx.lineTo(-size * 1.1, size * .9);
      ctx.lineTo(-size * .4, size * .7);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(size * .5, size * .3);
      ctx.lineTo(size * 1.1, size * .9);
      ctx.lineTo(size * .4, size * .7);
      ctx.fill();

      // Shield effect
      if (shields > 0) {
        ctx.globalAlpha = .15 + Math.sin(Date.now() / 300) * .1;
        ctx.strokeStyle = '#06b6d4';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, size * 1.5, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }

      ctx.restore();
    }

    // в”Җв”Җ Draw meteor в”Җв”Җ
    function drawMeteor(x, y, size, rot) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rot);

      // Glow
      if (!isMobile) { ctx.shadowColor = '#f97316'; ctx.shadowBlur = 10; }

      // Rocky body
      const grad = ctx.createRadialGradient(-size * .2, -size * .2, 0, 0, 0, size);
      grad.addColorStop(0, '#a16207');
      grad.addColorStop(.5, '#78350f');
      grad.addColorStop(1, '#451a03');
      ctx.fillStyle = grad;

      // Irregular shape
      ctx.beginPath();
      const points = 8;
      for (let i = 0; i < points; i++) {
        const angle = (i / points) * Math.PI * 2;
        const r = size * (.7 + Math.sin(i * 2.7) * .3);
        if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
        else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
      }
      ctx.closePath();
      ctx.fill();

      // Craters
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(0,0,0,.3)';
      ctx.beginPath(); ctx.arc(size * .2, -size * .1, size * .15, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(-size * .25, size * .2, size * .12, 0, Math.PI * 2); ctx.fill();

      // Fire trail (top side = direction of travel)
      ctx.globalAlpha = .5;
      const fire = ctx.createRadialGradient(0, -size * .8, 0, 0, -size * .8, size * .6);
      fire.addColorStop(0, 'rgba(249,115,22,.6)');
      fire.addColorStop(.5, 'rgba(239,68,68,.2)');
      fire.addColorStop(1, 'rgba(249,115,22,0)');
      ctx.fillStyle = fire;
      ctx.beginPath(); ctx.arc(0, -size * .8, size * .5, 0, Math.PI * 2); ctx.fill();

      ctx.restore();
    }

    // в”Җв”Җ Draw star collectible в”Җв”Җ
    function drawStar(x, y, phase) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(phase * .5);

      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 20);
      glow.addColorStop(0, 'rgba(245,158,11,.4)');
      glow.addColorStop(1, 'rgba(245,158,11,0)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(0, 0, 18 + Math.sin(phase) * 3, 0, Math.PI * 2); ctx.fill();

      // Star shape
      ctx.fillStyle = '#f59e0b';
      if (!isMobile) { ctx.shadowColor = '#f59e0b'; ctx.shadowBlur = 12; }
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a = (i * 72 - 90) * Math.PI / 180;
        const aInner = ((i * 72 + 36) - 90) * Math.PI / 180;
        ctx.lineTo(Math.cos(a) * 10, Math.sin(a) * 10);
        ctx.lineTo(Math.cos(aInner) * 5, Math.sin(aInner) * 5);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // в”Җв”Җ Input в”Җв”Җ
    function ptrMove(e) { const p = e.touches ? e.touches[0] : e; ptrX = p.clientX; ptrY = p.clientY }
    function ptrEnd() { ptrX = null; ptrY = null }
    canvas.addEventListener('mousemove', ptrMove);
    canvas.addEventListener('touchmove', e => { e.preventDefault(); ptrMove(e) }, { passive: false });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); ptrMove(e); initAudio() }, { passive: false });
    canvas.addEventListener('mouseup', ptrEnd);
    canvas.addEventListener('touchend', ptrEnd);

    // в”Җв”Җ Game loop в”Җв”Җ
    function gameLoop() {
      if (!isPlaying) return;
      elapsed += 1 / 60;
      if (invulnTimer > 0) invulnTimer--;
      score = Math.floor(elapsed * 10);
      difficulty = 1 + elapsed / 12;

      // Ship movement
      if (ptrX !== null) {
        ship.x += (ptrX - ship.x) * .1;
        ship.y += (ptrY - ship.y) * .1;
      }
      ship.x = Math.max(ship.size, Math.min(W - ship.size, ship.x));
      ship.y = Math.max(ship.size, Math.min(H - ship.size, ship.y));

      // Spawn
      if (Math.random() < .018 + difficulty * .007) {
        const size = 12 + Math.random() * 25 + difficulty * 2;
        meteors.push({
          x: Math.random() * W, y: -size * 2,
          size, vy: 2.5 + Math.random() * 3 + difficulty * .4,
          vx: (Math.random() - .5) * 2.5,
          rot: 0, rs: (Math.random() - .5) * .06
        });
      }
      if (Math.random() < .004) {
        stars_.push({ x: Math.random() * W, y: -25, vy: 1.2 + Math.random() * 2, phase: Math.random() * Math.PI * 2 });
      }

      // Engine trail (less often on mobile)
      if (Math.random() < (isMobile ? .15 : .4)) {
        engineTrail.push({
          x: ship.x + (Math.random() - .5) * 6,
          y: ship.y + ship.size + 5,
          vx: (Math.random() - .5) * .5,
          vy: 1 + Math.random() * 2,
          life: 1, size: 2 + Math.random() * 3
        });
      }

      // в”Җв”Җ Render в”Җв”Җ
      ctx.save();
      if (screenShake > 0) {
        ctx.translate((Math.random() - .5) * screenShake, (Math.random() - .5) * screenShake);
        screenShake *= .88;
        if (screenShake < .5) screenShake = 0;
      }

      // Background
      ctx.fillStyle = '#020210';
      ctx.fillRect(0, 0, W, H);

      // Nebula (skip on mobile)
      if (!isMobile) {
        nebulaPhase.r += .003;
        const nbx = W * .5 + Math.sin(nebulaPhase.r) * W * .3;
        const nby = H * .3 + Math.cos(nebulaPhase.r * .7) * H * .2;
        const neb = ctx.createRadialGradient(nbx, nby, 0, nbx, nby, W * .4);
        neb.addColorStop(0, 'rgba(139,92,246,.04)');
        neb.addColorStop(.5, 'rgba(6,182,212,.02)');
        neb.addColorStop(1, 'transparent');
        ctx.fillStyle = neb;
        ctx.fillRect(0, 0, W, H);
      }

      // Stars
      bgStars.forEach(s => {
        s.y += s.sp;
        s.twinkle += .02;
        if (s.y > H) { s.y = -5; s.x = Math.random() * W * 2 }
        const alpha = s.a * (.5 + Math.sin(s.twinkle) * .5);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.fillRect(s.x % W, s.y, s.s, s.s);
      });

      // Engine trail
      engineTrail = engineTrail.filter(p => {
        p.life -= .04; p.x += p.vx; p.y += p.vy;
        ctx.save();
        ctx.globalAlpha = p.life * .6;
        ctx.fillStyle = p.life > .5 ? '#06b6d4' : '#8b5cf6';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        return p.life > 0;
      });

      // Meteors
      meteors = meteors.filter(m => {
        m.y += m.vy; m.x += m.vx; m.rot += m.rs;
        drawMeteor(m.x, m.y, m.size, m.rot);

        const dx = m.x - ship.x, dy = m.y - ship.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < m.size * .5 + ship.size * .5 && invulnTimer <= 0) {
          if (shields > 0) {
            shields--;
            playHit();
            screenShake = 12;
            document.getElementById('h-shield').textContent = shields > 0 ? `рҹӣЎпёҸГ—${shields}` : 'вҡ пёҸ ж— жҠӨзӣҫ';
            const shieldParticles = isMobile ? 5 : 12;
            for (let i = 0; i < shieldParticles; i++) {
              const a = Math.random() * Math.PI * 2;
              particles.push({ x: m.x, y: m.y, vx: Math.cos(a) * 5, vy: Math.sin(a) * 5, life: 1, color: '#06b6d4', size: 3 });
            }
            return false;
          } else {
            playExplode();
            screenShake = 25;
            // Death explosion
            const deathCount = isMobile ? 15 : 40;
            for (let i = 0; i < deathCount; i++) {
              const a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 8;
              particles.push({ x: ship.x, y: ship.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, life: 1, color: i % 3 === 0 ? '#06b6d4' : i % 3 === 1 ? '#8b5cf6' : '#f97316', size: 2 + Math.random() * 5 });
            }
            endGame();
            return false;
          }
        }
        return m.y < H + 60;
      });

      // Stars collectible
      stars_ = stars_.filter(s => {
        s.y += s.vy; s.phase += .05;
        drawStar(s.x, s.y, s.phase);
        const dx = s.x - ship.x, dy = s.y - ship.y;
        if (Math.sqrt(dx * dx + dy * dy) < 28) {
          score += 50; starsCollected++;
          playStar();
          const starBurstCount = isMobile ? 4 : 8;
          for (let i = 0; i < starBurstCount; i++) {
            const a = Math.random() * Math.PI * 2;
            particles.push({ x: s.x, y: s.y, vx: Math.cos(a) * 4, vy: Math.sin(a) * 4, life: 1, color: '#f59e0b', size: 2 + Math.random() * 3 });
          }
          particles.push({ x: s.x, y: s.y - 20, vx: 0, vy: -2, life: 1, text: '+50 вӯҗ', isText: true, color: '#f59e0b' });
          return false;
        }
        return s.y < H + 30;
      });

      // Particles
      if (particles.length > MAX_P) particles.splice(0, particles.length - MAX_P);
      particles = particles.filter(p => {
        p.life -= .025; p.x += p.vx; p.y += p.vy;
        if (p.isText) {
          ctx.save(); ctx.globalAlpha = p.life;
          ctx.font = 'bold 16px sans-serif'; ctx.fillStyle = p.color;
          ctx.textAlign = 'center';
          if (!isMobile) { ctx.shadowColor = p.color; ctx.shadowBlur = 8; }
          ctx.fillText(p.text, p.x, p.y); ctx.restore();
        } else {
          ctx.save(); ctx.globalAlpha = p.life;
          ctx.fillStyle = p.color;
          if (!isMobile) { ctx.shadowColor = p.color; ctx.shadowBlur = 5; }
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
        }
        return p.life > 0;
      });

      // Ship
      if (isPlaying) drawShip(ship.x, ship.y, ship.size);

      ctx.restore();

      // HUD
      document.getElementById('h-time').textContent = elapsed.toFixed(1) + 's';
      document.getElementById('h-score').textContent = score;
      _rafId = requestAnimationFrame(gameLoop);
    }

    function startGame() {
      initAudio();
      ship = { x: W / 2, y: H * .75, size: 22 };
      meteors = []; stars_ = []; particles = []; engineTrail = [];
      score = 0; shields = 3; elapsed = 0; difficulty = 1; starsCollected = 0;
      screenShake = 0; isPlaying = true; invulnTimer = 120; // 2 seconds invulnerability
      document.getElementById('start-ov').classList.add('hidden');
      document.getElementById('end-ov').classList.add('hidden');
      document.getElementById('hud').classList.remove('hidden');
      document.getElementById('h-shield').textContent = 'рҹӣЎпёҸГ—3';
      gameLoop();
    }

    function endGame() {
      isPlaying = false;
      const best = getBest(); const isNew = score > best; saveBest(score);
      document.getElementById('f-score').textContent = score;
      document.getElementById('f-time').textContent = elapsed.toFixed(1) + 's';
      document.getElementById('f-stars').textContent = starsCollected;
      document.getElementById('f-best').textContent = `жңҖдҪі: ${Math.max(score, best)}`;
      document.getElementById('f-rec').classList.toggle('show', isNew);
      document.getElementById('end-ov').classList.remove('hidden');
      document.getElementById('hud').classList.add('hidden');
    }

    function shareScore() {
      const t = `рҹҡҖ йҷЁзҹій—ӘйҒҝ: ${score}еҲҶ! еӯҳжҙ»${elapsed.toFixed(1)}з§’\nвӯҗ ж”¶йӣҶ${starsCollected}йў—жҳҹжҳҹ\nрҹҺ® жқҘShipMicroзҺ©: ${location.origin}/arcade`;
      if (navigator.share) navigator.share({ title: 'йҷЁзҹій—ӘйҒҝ', text: t });
      else navigator.clipboard.writeText(t).then(() => alert('е·ІеӨҚеҲ¶еҲ°еүӘиҙҙжқҝ!'));
    }
  </script>
